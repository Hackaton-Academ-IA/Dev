# Configuration Nginx pour Academ'IA - SRV-PROD
# IP du serveur : 192.43.9.55

server {
    listen 80;
    server_name 192.43.9.55;

    # Redirection automatique de tout le trafic HTTP vers HTTPS
    # Crucial pour la sécurité et la disponibilité du service
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 192.43.9.55;

    # Chemins internes au conteneur (mappés via le volume Docker)
    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    # Optimisations SSL (Sécurité accrue)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy vers l'application NextJS (service 'web')
    location / {
        proxy_pass http://web:3000; # Nom du service dans le docker-compose
        
        # Transmission des en-têtes réels pour l'authentification
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gestion des Timeouts pour éviter les coupures (Performance)
        proxy_connect_timeout       60s;
        proxy_send_timeout          60s;
        proxy_read_timeout          60s;
    }

    # Optionnel : Gestion des erreurs Nginx
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
